name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (e.g. v1.0.2). If empty, use package.json version."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target_args: --linux AppImage deb rpm
            artifact_name: dist-linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.yml
              dist/*.blockmap
          - name: Windows
            os: windows-latest
            target_args: --win nsis
            artifact_name: dist-windows
            artifact_glob: |
              dist/*.exe
              dist/*.nsis.7z
              dist/*.yml
              dist/*.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag }}
        run: |
          node -e "const fs=require('fs'); const ref=process.env.GITHUB_REF||''; const input=(process.env.RELEASE_TAG_INPUT||'').trim(); let version=''; if(/^v.+/.test(input)){version=input.slice(1);} else { const m=ref.match(/^refs\/tags\/v(.+)$/); if(m) version=m[1]; } if(!version){version=require('./package.json').version;} fs.appendFileSync(process.env.GITHUB_ENV, `APP_VERSION=${version}\n`); console.log(`Using app version: ${version}`);"

      - name: Build renderer/main
        run: npm run build

      - name: Package app
        run: npx electron-builder ${{ matrix.target_args }} --publish never --config.extraMetadata.version=${{ env.APP_VERSION }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            TAG="${GITHUB_REF_NAME}"
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**
