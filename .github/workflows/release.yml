name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || github.run_id }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            os: ubuntu-latest
            target_args: --linux AppImage deb rpm
            artifact_name: dist-linux
            artifact_glob: |
              dist/*.AppImage
              dist/*.deb
              dist/*.rpm
              dist/*.yml
              dist/*.blockmap
          - name: Windows
            os: windows-latest
            target_args: --win nsis
            artifact_name: dist-windows
            artifact_glob: |
              dist/*.exe
              dist/*.nsis.7z
              dist/*.yml
              dist/*.blockmap

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve app version
        shell: bash
        run: |
          VERSION=""
          if [[ "${GITHUB_REF:-}" =~ ^refs/tags/v(.+)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi

          echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "Using app version: ${VERSION}"

      - name: Build renderer/main
        run: npm run build

      - name: Package app
        run: npx electron-builder ${{ matrix.target_args }} --publish never --config.extraMetadata.version=${{ env.APP_VERSION }}

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: release-assets

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/**
