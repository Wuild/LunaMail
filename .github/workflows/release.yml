name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux-release:
    name: Build And Publish Linux Release
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Sync Version From Tag
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          VERSION="${TAG_NAME#v}"
          echo "Tag version: ${VERSION}"
          npm version "${VERSION}" --no-git-tag-version
          if git diff --quiet -- package.json package-lock.json; then
            echo "Version already synced."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): sync version ${VERSION} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Build App
        run: npm run build

      - name: Publish AppImage Release
        run: npx electron-builder --linux AppImage --publish always
