name: Release

on:
    push:
        tags:
            - 'v*'

permissions:
    contents: write

concurrency:
    group: release-${{ github.ref_name || github.run_id }}
    cancel-in-progress: false

jobs:
    build:
        name: Build ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Linux
                      os: ubuntu-latest
                      target_args: --linux AppImage deb rpm zip --x64 --arm64
                      artifact_name: dist-linux
                      artifact_glob: |
                          dist/*.AppImage
                          dist/*.deb
                          dist/*.rpm
                          dist/*.zip
                          dist/*.yml
                          dist/*.blockmap
                    - name: Windows
                      os: windows-latest
                      target_args: --win nsis zip --x64 --arm64
                      artifact_name: dist-windows
                      artifact_glob: |
                          dist/*.exe
                          dist/*.zip
                          dist/*.exe.blockmap
                          dist/*.nsis.7z
                          dist/*.nsis.7z.blockmap
                          dist/latest*.yml
                          dist/*.blockmap
                    - name: macOS Apple Silicon
                      os: macos-15
                      target_args: --mac dmg zip --arm64
                      artifact_name: dist-macos-arm64
                      artifact_glob: |
                          dist/*-arm64-mac.zip
                          dist/*-arm64.dmg
                          dist/latest-mac.yml
                          dist/*.blockmap

        env:
            CSC_IDENTITY_AUTO_DISCOVERY: 'false'

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build workspace packages
              run: npm run build:packages

            - name: Resolve app version
              shell: bash
              run: |
                  VERSION=""
                  if [[ "${GITHUB_REF:-}" =~ ^refs/tags/v(.+)$ ]]; then
                    VERSION="${BASH_REMATCH[1]}"
                  else
                    VERSION="$(node -p "require('./package.json').version")"
                  fi

                  echo "APP_VERSION=${VERSION}" >> "${GITHUB_ENV}"
                  echo "Using app version: ${VERSION}"

            - name: Build renderer/main
              run: npm run build

            - name: Package app
              run: npx electron-builder ${{ matrix.target_args }} --publish never --config.extraMetadata.version=${{ env.APP_VERSION }}

            - name: List packaged files
              shell: bash
              run: |
                  echo "Dist files:"
                  find dist -maxdepth 2 -type f | sort

            - name: Verify Windows update assets
              if: matrix.name == 'Windows'
              shell: bash
              run: |
                  set -euo pipefail
                  shopt -s nullglob
                  blockmaps=(dist/*.blockmap dist/*.exe.blockmap dist/*.nsis.7z.blockmap)
                  ymls=(dist/latest*.yml)
                  exes=(dist/*.exe)
                  echo "Found EXE files: ${#exes[@]}"
                  echo "Found blockmaps: ${#blockmaps[@]}"
                  echo "Found latest*.yml: ${#ymls[@]}"
                  if [ ${#exes[@]} -eq 0 ]; then
                    echo "No Windows installer (.exe) generated in dist/"
                    exit 1
                  fi
                  if [ ${#ymls[@]} -eq 0 ]; then
                    echo "No latest*.yml generated in dist/"
                    exit 1
                  fi
                  if [ ${#blockmaps[@]} -eq 0 ]; then
                    echo "No blockmap files generated in dist/ (delta updates will not work)"
                    exit 1
                  fi

            - name: Upload packaged artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.artifact_glob }}
                  if-no-files-found: error

    release:
        name: Create GitHub Release
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Resolve release tag
              id: tag
              shell: bash
              run: |
                  if [ "${GITHUB_REF_TYPE}" = "tag" ] && [ -n "${GITHUB_REF_NAME}" ]; then
                    TAG="${GITHUB_REF_NAME}"
                  else
                    VERSION="$(node -p "require('./package.json').version")"
                    TAG="v${VERSION}"
                  fi
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Download Linux artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-linux
                  path: release-assets

            - name: Download Windows artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-windows
                  path: release-assets

            - name: Download macOS Apple Silicon artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-macos-arm64
                  path: release-assets

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.tag.outputs.tag }}
                  generate_release_notes: true
                  files: |
                      release-assets/**
